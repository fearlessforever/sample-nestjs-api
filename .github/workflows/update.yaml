name: Test & Build for any problem before PR

on:
  # push:
  #   branches:
  #     - update
  pull_request:
    branches:
      - development

jobs:
  test-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18.16.x'

      # The Following lines will Cache the npm modules when runing the test
      # so the actions will be faster
      - name: Cache node modules
        uses: actions/cache@v4
        env:
          cache-name: cache-node-modules
        with:
          # npm cache files are stored in `~/.npm` on Linux/MacOS
          path: ~/.npm
          key: ${{ runner.os }}-build -${{ env.cache-name}}-${{  hashFiles('**/package-lock.json') }}
          restore-keys: | 
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}
        
      - name: NPM install and Build ~ CI commands
          # disable npm run test since cant start ChromeHeaderless in CI/CD environment
        run: |
          npm i
          npm run build

  build-and-publish-docker-image:
    needs: test-build
    runs-on: ubuntu-latest
    permissions:
      packages: write
      # contents: read
      # attestations: write
      # id-token: write

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.MY_RELEASE_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}:latest