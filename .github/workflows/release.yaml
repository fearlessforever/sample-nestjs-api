name: Test & Build & Push Docker Image to Docker Hub

on:
  release:
    types: [published] # Trigger only when a release is published
  # push:
  #   branches:
  #     - development # this will also run after a branch merge into development
  # pull_request:
  #   branches:
  #     - development
  #   types:
  #     - closed

jobs:
  build-and-publish-docker-image:
    needs: test-build-and-release
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: ~/.cache/docker
          key: ${{ runner.os }}-docker-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-docker-

      - name: Build the Docker image
        run: |
          docker build -f docker/dockerfile -t ${{ secrets.DOCKER_USERNAME }}/nestjs-app:${{ github.sha }} . --progress=plain

      - name: Push Docker image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/nestjs-app:${{ github.sha }}

  test-build-and-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18.16.x'

      # The Following lines will Cache the npm modules when runing the test
      # so the actions will be faster
      - name: Cache node modules
        uses: actions/cache@v4
        env:
          cache-name: cache-node-modules
        with:
          # npm cache files are stored in `~/.npm` on Linux/MacOS
          path: ~/.npm
          key: ${{ runner.os }}-build -${{ env.cache-name}}-${{  hashFiles('**/package-lock.json') }}
          restore-keys: | 
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}
        
      - name: NPM install and Build ~ CI commands
        # disable npm run test since cant start ChromeHeaderless in CI/CD environment
        run: |
          npm i
          npm run build

      - name: Create release artifact (e.g., a zip file)
        run: zip -r nestjs-app.zip dist/ package.json package-lock.json README.md # Adjust based on your project's output

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.MY_RELEASE_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./nestjs-app.zip
          asset_name: nestjs-app-${{ github.event.release.tag_name }}.zip
          asset_content_type: application/zip